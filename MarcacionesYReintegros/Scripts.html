<script>
  (function () {
    const form = document.getElementById('formRadicacion');
    const btnEnviar = document.getElementById('btnEnviar');
    const btnLimpiar = document.getElementById('btnLimpiar');
    const mensaje = document.getElementById('mensaje');
    const btnTexto = btnEnviar.querySelector('.btn-texto');
    const btnLoader = btnEnviar.querySelector('.btn-loader');
    const seccionReintegro = document.getElementById('seccionReintegro');
    const camposReintegro = ['periodo', 'ciudad'];

    // Autocomplete ciudad
    const inputCiudad = document.getElementById('ciudad');
    const listaSugerencias = document.getElementById('ciudad-sugerencias');
    const hintCiudad = document.getElementById('ciudad-hint');
    let municipios = [];          // lista original
    let municipiosNorm = [];      // misma lista normalizada (sin tildes/mayus) para filtrar rápido
    let indiceActivo = -1;
    const MAX_SUGERENCIAS = 8;

    const MAX_BYTES = 25 * 1024 * 1024;
    // Solo "Reintegro" y "Ambas" disparan la sección 4.
    const MOTIVOS_REINTEGRO = ['Reintegro', 'Ambas'];

    function actualizarSeccionReintegro() {
      const motivo = document.querySelector('input[name="motivo"]:checked');
      const aplica = motivo && MOTIVOS_REINTEGRO.includes(motivo.value);
      seccionReintegro.hidden = !aplica;
      camposReintegro.forEach(id => {
        const campo = document.getElementById(id);
        if (campo) {
          if (aplica) campo.setAttribute('required', 'required');
          else campo.removeAttribute('required');
        }
      });
    }

    document.querySelectorAll('input[name="motivo"]').forEach(r => {
      r.addEventListener('change', actualizarSeccionReintegro);
    });

    // ====================================================================
    //  AUTOCOMPLETE DE MUNICIPIOS
    // ====================================================================
    function normalizar(texto) {
      return (texto || '')
        .toString()
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function cargarMunicipios() {
      if (!inputCiudad) return;

      google.script.run
        .withSuccessHandler(function (lista) {
          if (Array.isArray(lista) && lista.length > 0) {
            municipios = lista;
            municipiosNorm = lista.map(normalizar);
            if (hintCiudad) {
              hintCiudad.textContent =
                'Diligencie una solicitud por cada año a reintegrar. Use punto "." para decimales. ' +
                municipios.length + ' municipios disponibles.';
            }
          } else {
            if (hintCiudad) hintCiudad.textContent = 'No se pudieron cargar los municipios.';
          }
        })
        .withFailureHandler(function (err) {
          if (hintCiudad) hintCiudad.textContent = 'Error al cargar la lista de municipios.';
          console.error('Error cargando municipios:', err);
        })
        .obtenerMunicipios();
    }

    function filtrarMunicipios(consulta) {
      const q = normalizar(consulta);
      if (!q) return [];

      const empiezan = [];
      const contienen = [];

      for (let i = 0; i < municipiosNorm.length; i++) {
        const norm = municipiosNorm[i];
        if (norm.startsWith(q)) {
          empiezan.push(municipios[i]);
        } else if (norm.includes(q)) {
          contienen.push(municipios[i]);
        }
        if (empiezan.length + contienen.length >= MAX_SUGERENCIAS * 2) break;
      }

      // Los que empiezan con la búsqueda van primero
      return empiezan.concat(contienen).slice(0, MAX_SUGERENCIAS);
    }

    function resaltar(texto, consulta) {
      if (!consulta) return texto;
      const tNorm = normalizar(texto);
      const qNorm = normalizar(consulta);
      const idx = tNorm.indexOf(qNorm);
      if (idx === -1) return texto;
      const fin = idx + qNorm.length;
      return texto.slice(0, idx) +
        '<mark>' + texto.slice(idx, fin) + '</mark>' +
        texto.slice(fin);
    }

    function pintarSugerencias(resultados, consulta) {
      listaSugerencias.innerHTML = '';
      indiceActivo = -1;

      if (resultados.length === 0) {
        const li = document.createElement('li');
        li.className = 'sugerencias-vacio';
        li.textContent = 'Sin coincidencias';
        listaSugerencias.appendChild(li);
        listaSugerencias.hidden = false;
        return;
      }

      resultados.forEach(function (m) {
        const li = document.createElement('li');
        li.setAttribute('role', 'option');
        li.dataset.valor = m;
        li.innerHTML = resaltar(m, consulta);
        li.addEventListener('mousedown', function (e) {
          // mousedown en vez de click para que dispare antes del blur del input
          e.preventDefault();
          seleccionar(m);
        });
        listaSugerencias.appendChild(li);
      });

      listaSugerencias.hidden = false;
    }

    function seleccionar(valor) {
      inputCiudad.value = valor;
      listaSugerencias.hidden = true;
      indiceActivo = -1;
    }

    function moverActivo(delta) {
      const items = listaSugerencias.querySelectorAll('li[data-valor]');
      if (items.length === 0) return;

      if (indiceActivo >= 0 && items[indiceActivo]) {
        items[indiceActivo].classList.remove('activo');
      }

      indiceActivo += delta;
      if (indiceActivo < 0) indiceActivo = items.length - 1;
      if (indiceActivo >= items.length) indiceActivo = 0;

      items[indiceActivo].classList.add('activo');
      items[indiceActivo].scrollIntoView({ block: 'nearest' });
    }

    if (inputCiudad) {
      inputCiudad.addEventListener('input', function () {
        const consulta = inputCiudad.value.trim();
        if (!consulta) {
          listaSugerencias.hidden = true;
          return;
        }
        pintarSugerencias(filtrarMunicipios(consulta), consulta);
      });

      inputCiudad.addEventListener('keydown', function (e) {
        if (listaSugerencias.hidden) {
          if (e.key === 'ArrowDown' && inputCiudad.value.trim()) {
            pintarSugerencias(filtrarMunicipios(inputCiudad.value.trim()), inputCiudad.value.trim());
            moverActivo(1);
            e.preventDefault();
          }
          return;
        }

        switch (e.key) {
          case 'ArrowDown':
            moverActivo(1);
            e.preventDefault();
            break;
          case 'ArrowUp':
            moverActivo(-1);
            e.preventDefault();
            break;
          case 'Enter':
            const items = listaSugerencias.querySelectorAll('li[data-valor]');
            if (indiceActivo >= 0 && items[indiceActivo]) {
              seleccionar(items[indiceActivo].dataset.valor);
              e.preventDefault();
            }
            break;
          case 'Escape':
            listaSugerencias.hidden = true;
            indiceActivo = -1;
            break;
        }
      });

      inputCiudad.addEventListener('blur', function () {
        // pequeño delay para permitir el mousedown en la lista
        setTimeout(function () { listaSugerencias.hidden = true; }, 150);
      });

      inputCiudad.addEventListener('focus', function () {
        const consulta = inputCiudad.value.trim();
        if (consulta) {
          pintarSugerencias(filtrarMunicipios(consulta), consulta);
        }
      });
    }

    // ====================================================================
    //  ENVÍO DEL FORMULARIO
    // ====================================================================
    btnLimpiar.addEventListener('click', () => {
      form.reset();
      mensaje.hidden = true;
      if (listaSugerencias) listaSugerencias.hidden = true;
      actualizarSeccionReintegro();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      mensaje.hidden = true;

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const archivosInput = document.getElementById('soportes');
    if (!archivosInput.files || archivosInput.files.length === 0) {
      mensaje.className = 'mensaje error';
      mensaje.innerHTML = '<strong>Debe adjuntar los documentos requeridos</strong> este es un campo obligatorio.';
      mensaje.hidden = false;
      archivosInput.focus();
      archivosInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    setEnviando(true);

      setEnviando(true);

      try {
        const datos = {};
        const fd = new FormData(form);

        fd.forEach((valor, clave) => {
          if (clave === 'soportes' || clave === 'impuestos') return;
          datos[clave] = valor;
        });

        const impuestos = fd.getAll('impuestos');
        datos.impuestos = impuestos.join(', ');

        const archivos = await procesarArchivos(document.getElementById('soportes').files);

        google.script.run
          .withSuccessHandler(onExito)
          .withFailureHandler(onError)
          .procesarFormularioWeb(datos, archivos);

      } catch (err) {
        onError(err);
      }
    });

    async function procesarArchivos(fileList) {
      if (!fileList || fileList.length === 0) return [];

      let total = 0;
      for (const f of fileList) total += f.size;
      if (total > MAX_BYTES) {
        throw new Error('Los archivos exceden los 25 MB permitidos.');
      }

      const lecturas = Array.from(fileList).map(file => new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          res({ nombre: file.name, tipo: file.type || 'application/octet-stream', base64 });
        };
        reader.onerror = () => rej(new Error('No se pudo leer ' + file.name));
        reader.readAsDataURL(file);
      }));

      return Promise.all(lecturas);
    }

    function onExito(resp) {
      setEnviando(false);
      if (resp && resp.ok) {
        mensaje.className = 'mensaje exito';
        mensaje.innerHTML =
          '<div class="exito-radicado">' +
            '<div class="exito-titulo">✅ Solicitud radicada exitosamente</div>' +
            '<div class="exito-numero-label">Su número de radicado es:</div>' +
            '<div class="exito-numero">#' + resp.radicado + '</div>' +
            '<div class="exito-info">' +
              'Guarde este número para consultas posteriores. ' +
              'Le hemos enviado una copia del formulario al correo registrado.<br><br>' +
              '<a href="' + resp.urlPDF + '" target="_blank" rel="noopener">📄 Abrir PDF de la radicación</a>' +
            '</div>' +
          '</div>';
        mensaje.hidden = false;
        form.reset();
        actualizarSeccionReintegro();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        mostrarError((resp && resp.mensaje) || 'No se pudo procesar la solicitud.');
      }
    }

    function onError(err) {
      setEnviando(false);
      mostrarError(err && err.message ? err.message : err.toString());
    }

    function mostrarError(texto) {
      mensaje.className = 'mensaje error';
      mensaje.innerHTML = '⚠️ <strong>Error:</strong> ' + texto;
      mensaje.hidden = false;
    }

    function setEnviando(activo) {
      btnEnviar.disabled = activo;
      btnTexto.hidden = activo;
      btnLoader.hidden = !activo;
    }

    // Inicialización
    actualizarSeccionReintegro();
    cargarMunicipios();
  })();
</script>
