<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 600px; margin: 0 auto; }

    /* Banner Davivienda */
    .banner {
      width: 100%;
      background: #ED1C27;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }
    .banner-placeholder {
      padding: 40px 20px;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 2px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
    }
    h2 { color: #2c3e50; margin: 0 0 5px; font-weight: 600; }
    p.subtitle { color: #7f8c8d; font-size: 14px; margin: 0 0 25px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { font-size: 12px; font-weight: 600; color: #34495e; text-transform: uppercase; }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #dcdde1;
      border-radius: 6px;
      font-size: 16px;
      transition: 0.3s;
    }
    input[type="text"]:focus { border-color: #ED1C27; outline: none; }
    button {
      background-color: #ED1C27;
      color: white;
      border: none;
      padding: 12px 20px;
      width: 100%;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background-color: #b8141d; }

    .loader {
      display: none; margin: 20px auto;
      border: 4px solid #f3f3f3; border-top: 4px solid #ED1C27;
      border-radius: 50%; width: 30px; height: 30px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #resultado { margin-top: 25px; }
    .resultado-item {
      padding: 15px;
      border-radius: 8px;
      text-align: left;
      margin-bottom: 12px;
      background-color: #e8f4fd;
      border-left: 5px solid #3498db;
    }
    .error-box {
      padding: 15px;
      border-radius: 8px;
      text-align: left;
      background-color: #fdf2f2;
      border-left: 5px solid #e74c3c;
      color: #c0392b;
      font-size: 14px;
    }
    .res-item { margin-bottom: 8px; font-size: 14px; color: #2c3e50; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      color: white;
    }
    .badge-RECIBIDO  { background-color: #f39c12; }
    .badge-APROBADO  { background-color: #27ae60; }
    .badge-RECHAZADO { background-color: #e74c3c; }
    .badge-REQUERIDO { background-color: #8e44ad; }
  </style>
</head>
<body>

  <div class="container">

    <!-- BANNER DAVIVIENDA -->
    <!-- 👇 Reemplaza PEGA_AQUI_EL_ID por el ID de tu imagen en Drive -->
    <div class="banner">
      <img src="https://drive.google.com/thumbnail?id=PEGA_AQUI_EL_ID&sz=w1200" 
           alt="Davivienda"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="banner-placeholder" style="display:none;">DAVIVIENDA</div>
    </div>

    <div class="card">
      <h2>Consulta de Trámites</h2>
      <p class="subtitle">Ingresa tu Radicado, Cédula o NIT</p>

      <div class="form-group">
        <label for="radicadoInput">Radicado / Cédula / NIT</label>
        <input type="text" id="radicadoInput" placeholder="Ej: 13 o 1020304050" onkeypress="if(event.key==='Enter') realizarConsulta()">
      </div>

      <button onclick="realizarConsulta()">🔍 Buscar</button>

      <div id="loader" class="loader"></div>
      <div id="resultado"></div>
    </div>
  </div>

  <script>
    function realizarConsulta() {
      var valor = document.getElementById("radicadoInput").value;
      var loader = document.getElementById("loader");
      var resultadoDiv = document.getElementById("resultado");

      resultadoDiv.innerHTML = "";

      if (!valor.trim()) {
        resultadoDiv.innerHTML = '<div class="error-box">Por favor, digita un radicado o documento.</div>';
        return;
      }

      loader.style.display = "block";

      google.script.run
        .withSuccessHandler(function(res) {
          loader.style.display = "none";

          if (res.exito) {
            var html = "";
            res.resultados.forEach(function(r) {
              var estadoStr = (r.estado || "").toString();
              var estadoClase = "badge-RECIBIDO";
              if (estadoStr.indexOf("APROBADO")  !== -1) estadoClase = "badge-APROBADO";
              if (estadoStr.indexOf("RECHAZADO") !== -1) estadoClase = "badge-RECHAZADO";
              if (estadoStr.indexOf("REQUERIDO") !== -1) estadoClase = "badge-REQUERIDO";

              html += `
                <div class="resultado-item">
                  <div class="res-item"><strong>Radicado:</strong> ${r.radicado}</div>
                  <div class="res-item"><strong>Documento:</strong> ${r.documento}</div>
                  <div class="res-item"><strong>Impuesto:</strong> ${r.impuesto}</div>
                  <div class="res-item"><strong>Estado:</strong> <span class="badge ${estadoClase}">${estadoStr}</span></div>
                  <div class="res-item"><strong>Observaciones:</strong> ${r.observaciones}</div>
                </div>
              `;
            });
            resultadoDiv.innerHTML = html;
          } else {
            resultadoDiv.innerHTML = '<div class="error-box">' + res.mensaje + '</div>';
          }
        })
        .withFailureHandler(function(err) {
          loader.style.display = "none";
          resultadoDiv.innerHTML = '<div class="error-box">Error: ' + err.message + '</div>';
        })
        .buscarRadicado(valor);
    }
  </script>
</body>
</html>
